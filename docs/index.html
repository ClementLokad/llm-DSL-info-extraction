<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>PSC INF01 X24 : LLM pour l'extraction d'information dans un DSL : Cas de Envision (LOKAD)</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Site de presentation PSC Envision Copilot">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/style.min.css" title="docsify-darklight-theme" type="text/css" />
  <style>
    .sidebar { display: flex !important; flex-direction: column !important; background-color: var(--sidebar-background) !important; }
    .app-name { order: 1 !important; margin-top: 20px !important; font-weight: bold !important; font-size: 1.2rem !important; text-align: center !important; }
    .search { order: 2 !important; margin-bottom: 20px !important; }
    .sidebar-nav { order: 3 !important; flex: 1 !important; }
    
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('assets/x-background.png');
      background-repeat: no-repeat;
      background-position: center;
      background-size: 60%;
      opacity: 0.1;
      z-index: -1;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="app">Chargement...</div>
  <script>
    window.$docsify = {
      name: 'Envision Copilot',
      repo: 'https://github.com/KpihX/envision-copilot-presentation',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      themeColor: '#007acc',
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Rechercher...',
        noData: 'Aucun resultat.',
        depth: 6
      },
      darklightTheme: {
        defaultTheme: 'dark'
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/index.min.js" type="text/javascript"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
